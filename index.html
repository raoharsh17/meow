<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Marriage Anniversary</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
overflow:hidden;
background:linear-gradient(270deg,#ff758c,#ff7eb3,#ff6a88,#ffb199);
background-size:800% 800%;
animation:bg 12s infinite alternate;
color:white;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:400px;
}

h1{
color:red;
font-size:32px;
text-shadow:0 0 15px red,0 0 30px pink;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px red}
to{text-shadow:0 0 30px red,0 0 50px pink}
}

.photo{
width:260px;
border-radius:20px;
box-shadow:0 0 25px white;
margin:20px;
}

.cake{
font-size:90px;
cursor:pointer;
transition:0.4s;
}

.cake:hover{
transform:scale(1.3);
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:40px;
background:red;
color:white;
cursor:pointer;
}

#message{
display:none;
font-size:24px;
margin-top:15px;
color:white;
animation:fade 2s forwards;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.heart{
position:fixed;
bottom:-20px;
color:red;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c4c5e.mp3">
</audio>

<canvas id="fireworks"></canvas>

<div class="container">

<h1>❤️ Happy Marriage Anniversary Mausa ji  & Masi ❤️</h1>

<img src="parents.jpg" class="photo">

<div class="cake" onclick="cutCake()">🎂</div>

<button onclick="cutCake()">MAKE IT SPECIAL</button>

<div id="message">
💖 Wishing you endless love and happiness 💖
</div>

</div>

<script>

function cutCake(){
document.getElementById("message").style.display="block";
launchFireworks();
startHearts();
}

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function launchFireworks(){

for(let i=0;i<150;i++){

particles.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*12,
vy:(Math.random()-0.5)*12,
life:120
})

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

if(p.life<=0) particles.splice(index,1)

})

requestAnimationFrame(animate)

}

animate()

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},250)

}

</script>

</body>

</html>
